name: Обновить турнирную таблицу

on:
  # Запускать каждые 30 минут с 11 июня по 19 июля 2026
  schedule:
    - cron: "*/30 * * * *"

  # Также можно запустить вручную в любой момент
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # нужно для git push

    steps:
      - name: Получить репозиторий
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Установить зависимости
        run: pip install requests beautifulsoup4

      - name: Запустить парсер
        run: python scripts/fetch_standings.py

      - name: Зафиксировать изменения (если есть)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tournament.json
          # Если изменений нет — git commit вернёт ошибку, это нормально
          git diff --cached --quiet || git commit -m "auto: обновление таблицы $(date -u '+%Y-%m-%d %H:%M UTC')"

      - name: Отправить изменения
        run: git push
